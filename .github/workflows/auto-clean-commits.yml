name: Auto clean old commits (gen-playlist)

on:
  schedule:
    - cron: '0 0 * * *'   # chạy mỗi ngày lúc 00:00 UTC
  workflow_dispatch:

jobs:
  clean_commits:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # cho phép push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Bắt buộc lấy full history để tính toán ngày tháng

      - name: Configure git
        run: |
          git config user.name "auto-clean-bot"
          git config user.email "auto-clean@users.noreply.github.com"

      - name: Keep only last 3 days of history
        run: |
          # 1. Tìm commit đầu tiên được tạo cách đây hơn 3 ngày
          SHRED_COMMIT=$(git rev-list -n 1 --before="3 days ago" main)

          # Nếu repo chưa tồn tại quá 3 ngày, script sẽ tự động dừng
          if [ -z "$SHRED_COMMIT" ]; then
            echo "Lịch sử commit chưa đủ 3 ngày, bỏ qua việc dọn dẹp."
            exit 0
          fi

          echo "Gom các commit từ: $SHRED_COMMIT trở về trước..."

          # 2. Tạo một nền móng mới (nhánh temp_branch) tại đúng thời điểm của 3 ngày trước
          git checkout --orphan temp_branch $SHRED_COMMIT
          
          # 3. Lưu toàn bộ trạng thái cũ đó thành 1 commit lưu trữ duy nhất
          git commit -m "chore: archive history older than 3 days"
          
          # 4. Nhấc các commit riêng lẻ của 3 ngày qua và đặt nối tiếp lên nền móng mới này
          git rebase --onto temp_branch $SHRED_COMMIT main
          
          # 5. Push đè lên kho lưu trữ
          git push -f origin main
